# ===========================================================================
# Wazzfly Admin Web — production container
#
#   docker compose up -d --build
#
# The SPA calls the REST API via VITE_* baked at image build time (Dockerfile
# ARGS / Coolify Build Variables). nginx only serves static files.
#
# The external network `wazzfly_default` is optional (for other stack services).
# Create it once if Compose errors on missing external network:
#
#   docker network create wazzfly_default
#
# ===========================================================================

services:
  wazzfly-admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: wazzfly/admin:latest
    container_name: wazzfly-admin
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - wazzfly_default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  wazzfly_default:
    external: true
