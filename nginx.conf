server {
    listen 0.0.0.0:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_vary on;

    # Static assets — long cache
    location ~* \.(?:css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom 404 (still serves SPA)
    error_page 404 /index.html;
}
